name: NestJS API CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package*.json"
      - "docker-compose.document.ci.yaml"
      - "document.e2e.Dockerfile"
      - "startup.document.ci.sh"
      - ".github/workflows/docker-e2e.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --fund=false

      - name: ESLint
        run: npm run lint

      - name: Dependency audit (high + critical)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true  # Warn but don't block — known overrides may cause noise

      - name: Unit tests
        run: npm run test:unit -- --ci --passWithNoTests

      # <database-document-block>
      - name: Run e2e tests for NestJS with Mongoose
        id: document
        run: docker compose -f docker-compose.document.ci.yaml --env-file env-example-document -p ci-document up --build --exit-code-from api

      - name: Show Docker logs on failure
        if: ${{ failure() && steps.document.conclusion == 'failure' }}
        run: docker compose -f docker-compose.document.ci.yaml --env-file env-example-document -p ci-document logs --no-color

      - name: Copy prod.log from container to host
        if: ${{ failure() && steps.document.conclusion == 'failure' }}
        run: docker cp ci-document-api-1:/usr/src/app/prod.log . || true
      # </database-document-block>

      - name: Upload prod.log to artifacts for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-logs
          path: prod.log

      - name: Cleanup Docker compose stack
        if: always()
        run: docker compose -f docker-compose.document.ci.yaml --env-file env-example-document -p ci-document down -v --remove-orphans
