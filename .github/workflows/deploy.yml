name: Deploy CRM API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: crm-api-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          command_timeout: 60m
          script: |
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            test -f .env.production

            export DOCKER_BUILDKIT=1
            export COMPOSE_BAKE=false

            # Build image once; all 4 services share the same image tag.
            docker build --pull -t crm-api:production .
            docker compose -f docker-compose.yml up -d --no-build --remove-orphans api-service worker-service omni-worker-service email-worker-service
            docker image prune -f
