name: Deploy CRM API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: crm-api-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          command_timeout: 60m
          script: |
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            test -f .env.production

            export DOCKER_BUILDKIT=0

            # Build image once, then run single all-in-one container.
            # To scale: switch to docker-compose.scaled.yml
            # --no-cache avoids stale layer cache
            for build_attempt in 1 2; do
              if docker build --pull --no-cache -t crm-api:production .; then
                break
              fi

              if [ "$build_attempt" -eq 2 ]; then
                exit 1
              fi

              echo "docker build failed on attempt $build_attempt of 2, pruning builder cache and retrying..."
              docker builder prune -af || true
              sleep 5
            done
            docker compose -f docker-compose.yml up -d --no-build --remove-orphans crm-api
            docker container prune -f
            docker image prune -f
