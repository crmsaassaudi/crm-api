name: Deploy CRM API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: crm-api-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          command_timeout: 60m
          script: |
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            test -f .env.production

            # ── Stop old container BEFORE building ─────────────────────────
            # This prevents overlayfs race conditions where the old container
            # still holds references to snapshot layers that get recycled
            # during the new build.
            docker compose -f docker-compose.yml down --timeout 30 2>/dev/null || true

            # Flush pending filesystem operations before building
            sync

            # ── Build with BuildKit ──────────────────────────────────────────
            # BuildKit handles layer caching and overlayfs snapshots more
            # reliably than the legacy builder, especially for deeply-nested
            # node_modules trees (@socket.io/*, @nestjs/*, etc.)
            export DOCKER_BUILDKIT=1

            # Build with retry: containerd overlayfs can still occasionally
            # fail on the first attempt if prior snapshots weren't fully
            # cleaned up. A single retry is sufficient.
            build_image() {
              docker build --pull --no-cache -t crm-api:production .
            }

            if ! build_image; then
              echo "⚠ Build failed, cleaning snapshots and retrying..."
              docker builder prune -f 2>/dev/null || true
              sync
              sleep 5
              build_image
            fi

            # ── Deploy: start new container ──────────────────────────────────
            docker compose -f docker-compose.yml up -d --no-build --remove-orphans crm-api

            # Give the new container time to fully start and attach to layers
            echo "Waiting for container to stabilize..."
            sleep 10

            # Health check: wait up to 60s for the API to respond
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.yml exec -T crm-api wget -qO- http://localhost:3000/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after 60s"
                docker compose -f docker-compose.yml logs --tail=50 crm-api
                exit 1
              fi
              echo "Waiting for API to start... (attempt $i/12)"
              sleep 5
            done

            # ── Cleanup: safe to prune now that new container is healthy ───
            docker container prune -f
            # Only prune dangling images (untagged) — avoid removing layers
            # still referenced by the running container's parent chain
            docker image prune -f --filter "dangling=true"
            sync
