# SonarQube Analysis Configuration for CRM API
# Docs: https://docs.sonarqube.org/latest/analysis/scan/sonarscanner/

sonar.projectKey=crm-api
sonar.projectName=CRM API
sonar.projectVersion=1.2.0

# ── Source configuration ──────────────────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.sourceEncoding=UTF-8

# ── Exclusions ────────────────────────────────────────────────────────
# Don't analyze generated code, migrations, seeds, and config files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.e2e-spec.ts,\
  **/database/seeds/**,\
  **/test/**,\
  **/__tests__/**,\
  **/__mocks__/**

# ── Coverage ──────────────────────────────────────────────────────────
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Quality Gate ──────────────────────────────────────────────────────
# Wait for quality gate result before finishing the analysis
sonar.qualitygate.wait=true
