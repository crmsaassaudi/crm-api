# ─────────────────────────────────────────────────────────────────────
#  CRM API — Single-container deployment (all-in-one)
#
#  API + all BullMQ workers run inside one container.
#  When you need to scale, switch to docker-compose.scaled.yml
#  which separates each runtime into its own container.
# ─────────────────────────────────────────────────────────────────────
services:
  crm-api:
    image: crm-api:production
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      NPM_CONFIG_CACHE: /tmp/.npm
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 0
      REDIS_QUEUE_DB: 1
    command: ['node', 'dist/main']
    ports:
      - '127.0.0.1:3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./files:/usr/src/app/files
      - ${ASSETS_PATH:-/var/crm-assets}:/var/crm-assets:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    memswap_limit: 2g
    cpus: '${CRM_API_CPUS:-1.0}'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      crm_api_net:
        ipv4_address: 172.25.0.10
    dns:
      - 8.8.8.8
      - 8.8.4.4

networks:
  crm_api_net:
    name: crm_api_net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
