services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      NPM_CONFIG_CACHE: /tmp/.npm
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 0
      REDIS_QUEUE_DB: 1
    command: ['npm', 'run', 'start:api:prod']
    ports:
      - '127.0.0.1:3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./files:/usr/src/app/files
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: '2.0'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      crm_api_net:
        ipv4_address: 172.25.0.10

  worker-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-api-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NPM_CONFIG_CACHE: /tmp/.npm
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 0
      REDIS_QUEUE_DB: 1
    command: ['npm', 'run', 'start:worker:prod']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./files:/usr/src/app/files
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: '2.0'
    networks:
      crm_api_net:
        ipv4_address: 172.25.0.11

networks:
  crm_api_net:
    name: crm_api_net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
